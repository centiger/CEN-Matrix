<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CEN-Matrix 분열왕국시대</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#132235">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6efe4;color:#17130f}
.header{height:72px;background:linear-gradient(135deg,#102033,#1d3651);color:#fff;padding:7px 10px 5px;box-shadow:0 2px 10px rgba(0,0,0,.16)}
.headerTop{height:38px;display:flex;align-items:center;gap:10px}
.menuBtn{width:36px;height:36px;border-radius:12px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.08);color:#fff;font-size:20px}
.brand{flex:1;min-width:0}.brand b{display:block;font-size:20px;font-weight:900;line-height:1}.brand span{display:block;font-size:10px;color:#e8d7c4;margin-top:4px}
.period{border:1px solid rgba(255,255,255,.4);border-radius:999px;padding:6px 10px;font-size:11px;color:#ffe9b7;white-space:nowrap}
.headerBottom{height:20px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:900}.headerBottom span:last-child{font-weight:600;color:#eadbc9}
.tabs{height:40px;display:flex;gap:7px;align-items:center;overflow-x:auto;padding:5px 10px;background:#f6eddf;border-bottom:1px solid #d5bea0}
.tab{flex:0 0 auto;padding:6px 13px;border-radius:999px;border:1px solid #c4ab87;background:#fffaf2;font-size:12px;font-weight:900;color:#1e150f;box-shadow:0 1px 3px rgba(60,35,15,.06);cursor:pointer}
.tab.active{background:#70451f;color:#fff;border-color:#70451f}
.main{height:calc(100% - 72px - 40px - 46px);overflow:auto;background:#fffaf2}
.matrix{min-width:1780px;display:grid;grid-template-columns:76px 1fr;background:#fffdf8}
.left{position:sticky;left:0;z-index:60;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:900;border-bottom:1px solid #dfc9aa;white-space:normal;word-break:keep-all;overflow:hidden}
.axisLeft{height:44px;font-size:13px;background:#fff0d8;position:sticky;top:0;z-index:90;width:76px;min-width:76px;max-width:76px;color:#3a2412;border-right:1px solid #dfc9aa}
.axis{position:sticky;top:0;z-index:50;height:44px;background:#fffaf2;border-bottom:1px solid #d8c3a2;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:visible}
.tick{position:absolute;top:10px;transform:translateX(-50%);font-size:14px;font-weight:900;color:#111;white-space:nowrap;letter-spacing:-.3px}
.tick.red{color:#b51313}.tick:after{content:"";position:absolute;left:50%;top:22px;width:1px;height:8px;background:#c2ad93}
.grid{position:absolute;top:0;bottom:0;border-left:1px dashed #ead9bf}
.rowLabel{width:76px;min-width:76px;max-width:76px;font-size:11.5px;line-height:1.08;padding:1px;color:#2b2118;border-right:1px solid #dfc9aa}
.labelNorth{background:#e7f3ff}.labelSouth{background:#ecf7e6}.labelProphets{background:#f2ebff}.labelNations{background:#fff0d8}.labelEvents{background:#ffece8}
.plot{position:relative;overflow:visible;border-bottom:1px solid #dfc9aa;background:#fffdf8}
.bar{position:absolute;height:18px;line-height:18px;border-radius:2px;padding:0 5px;font-size:10px;font-weight:900;color:#111;border:1px solid rgba(0,0,0,.14);white-space:nowrap;overflow:hidden;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.05);cursor:pointer}
.northBar{background:#dfefff;border-color:#9ec4ec}.southBar{background:#e3f2dc;border-color:#9dcc88}.prophetBar{background:#eee4ff;border-color:#b99de8}.nationBar{background:#ffe8c6;border-color:#efa64c;text-align:left;overflow:hidden}
.pin{overflow:visible;text-indent:-9999px}
.pin::after{content:attr(data-short);position:absolute;left:50%;transform:translateX(-50%);background:#332214;color:#fff;font-size:8.8px;padding:1px 5px;border-radius:4px;text-indent:0;white-space:nowrap;box-shadow:0 2px 4px rgba(0,0,0,.18);z-index:12}
.pin.up::after{bottom:24px}.pin.down::after{top:24px}.pin.south-pin::after{background:#253a1c}
.pin::before{content:"";position:absolute;left:50%;transform:translateX(-50%);width:1px;height:7px;background:#70451f;z-index:11}.pin.up::before{bottom:18px}.pin.down::before{top:18px}
.scroll-label{display:inline-block;font-weight:900;color:#2b1f15;white-space:nowrap;will-change:transform;padding-left:2px}
.dot{position:absolute;width:9px;height:9px;border-radius:50%;background:#cf2424;transform:translateX(-50%);box-shadow:0 0 0 2px rgba(207,36,36,.12);cursor:pointer}
.eventText{position:absolute;width:82px;transform:translateX(-50%);text-align:center;font-size:9.8px;font-weight:900;line-height:1.12;color:#2d2116}
.actions{height:46px;display:flex;gap:7px;overflow-x:auto;align-items:center;padding:5px 10px;background:#f6eddf;border-top:1px solid #d5bea0}
.action{flex:0 0 auto;padding:7px 15px;border-radius:12px;border:1px solid #c4ab87;background:#fffaf2;font-size:12px;font-weight:900;box-shadow:0 1px 3px rgba(60,35,15,.06);white-space:nowrap}
.hidden{display:none!important}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}
.card{width:min(430px,100%);background:#fffaf2;border:1px solid #d1b58a;border-radius:16px;padding:15px}.cardTitle{font-size:18px;font-weight:900;margin-bottom:7px;color:#3c2512}.cardBody{font-size:13px;line-height:1.55;white-space:pre-line;color:#4b3828}.close{width:100%;margin-top:12px;border:0;background:#70451f;color:white;border-radius:11px;padding:10px;font-weight:900;cursor:pointer}
@media(max-width:420px){.matrix{grid-template-columns:72px 1fr}.rowLabel,.axisLeft{width:72px;min-width:72px;max-width:72px}.rowLabel{font-size:11px}.axisLeft{font-size:12.5px}}

/* sidebar tone update: left fixed labels one tone darker than right bars */
.labelNorth{background:#cfe4fb !important;}
.labelSouth{background:#d8edcf !important;}
.labelProphets{background:#e3d6fb !important;}
.labelNations{background:#f3ddb6 !important;}
.labelEvents{background:#ffd8d0 !important;}


/* bottom actions: three-link layout without core-events */
.actions{
  justify-content:center !important;
}
.action{
  min-width:96px !important;
  text-align:center !important;
}
@media(max-width:420px){
  .actions{
    justify-content:flex-start !important;
  }
  .action{
    min-width:92px !important;
  }
}



/* final fixed labels for south Joash/Amaziah only */
.fixedKingLabel{
  position:absolute;
  transform:translateX(-50%);
  padding:2px 6px;
  border-radius:5px;
  font-size:9.2px;
  font-weight:900;
  line-height:1;
  color:#fff;
  white-space:nowrap;
  z-index:999;
  pointer-events:auto;
  box-shadow:0 1px 5px rgba(0,0,0,.25);
}
.fixedKingLabel.south{background:#253a1c;}
.fixedKingLabel.top::after,
.fixedKingLabel.bottom::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:1px;
  height:8px;
  background:#70451f;
}
.fixedKingLabel.top::after{bottom:-8px;}
.fixedKingLabel.bottom::after{top:-8px;}

</style>
</head>
<body>
<header class="header">
  <div class="headerTop"><button class="menuBtn">☰</button><div class="brand"><b>CEN‑Matrix</b><span>성경 시대별 총람</span></div><div class="period">BC 930 ~ BC 586</div></div>
  <div class="headerBottom"><span>분열왕국시대</span><span>북왕 · 남왕 · 선지자 · 주변국 · 사건</span></div>
</header>
<nav class="tabs">
  <button class="tab active" data-view="all">전체</button>
  <button class="tab active" data-view="northKings">북왕</button>
  <button class="tab active" data-view="southKings">남왕</button>
  <button class="tab active" data-view="prophets">선지자</button>
  <button class="tab active" data-view="nations">주변국</button>
  <button class="tab active" data-view="events">사건</button>
</nav>
<main class="main" id="mainScroll">
<div class="matrix" id="matrix">
  <div class="left axisLeft">연대</div><div class="axis" id="axis"></div>
  <div class="left rowLabel labelNorth view northKings">북이스라엘<br>왕</div><div class="plot view northKings" id="northPlot" style="height:76px"></div>
  <div class="left rowLabel labelSouth view southKings">남유다<br>왕</div><div class="plot view southKings" id="southPlot" style="height:76px"></div>
  <div class="left rowLabel labelProphets view prophets">선지자</div><div class="plot view prophets" id="prophetsPlot" style="height:278px"></div>
  <div class="left rowLabel labelNations view nations">주변국</div><div class="plot view nations" id="nationsPlot" style="height:190px"></div>
  <div class="left rowLabel labelEvents view events">핵심<br>사건</div><div class="plot view events" id="eventsPlot" style="height:188px"></div>
</div>
</main>
<footer class="actions">
  <button class="action" data-link="https://centiger.github.io/cen-bible-chrololgy/?view=timeline">성경연대기</button>
  <button class="action" data-link="https://centiger.github.io/cen-bible-chrololgy/#hub">연결탐험</button>
  <button class="action" data-link="https://centiger.github.io/CEN-Bible2.0/#overview66">한눈에 성경</button>
</footer>
<div class="modal" id="modal"><div class="card"><div class="cardTitle" id="modalTitle"></div><div class="cardBody" id="modalBody"></div><button class="close" id="closeModal">닫기</button></div></div>

<script>
const START=930, END=586, LEFT=4, RIGHT=94;
const pct=y=>LEFT+((START-y)/(START-END))*(RIGHT-LEFT);
const span=(s,e)=>({left:pct(s), width:Math.max(pct(e)-pct(s), .75)});
const ticks=[930,880,830,780,722,701,622,586];

const northKings=[
 ['여로보암 1세',930,909,'', '북이스라엘 초대 왕. 금송아지 숭배 체계의 출발점.'],
 ['나답',909,908,'up','단명 왕'],
 ['바아사',908,886,'','바아사 왕조'],
 ['엘라',886,885,'down','단명 왕'],
 ['시므리',885,884.8,'up','7일 왕'],
 ['오므리',885,874,'','사마리아를 수도로 삼은 오므리 왕조의 기반'],
 ['아합',874,853,'','이세벨·바알 숭배·엘리야 활동과 연결'],
 ['아하시야',853,852,'up','단명 왕'],
 ['여호람',852,841,'','엘리사 활동기와 연결'],
 ['예후',841,814,'','아합 왕조 심판, 예후 왕조 시작'],
 ['여호아하스',814,798,'',''],
 ['요아스',798,782,'',''],
 ['여로보암 2세',793,753,'','북이스라엘의 정치·경제적 팽창기. 아모스·호세아 배경'],
 ['스가랴',753,752,'up','예후 왕조 마지막 왕'],
 ['살룸',752,751.8,'down','단명 왕'],
 ['므나헴',752,742,'','앗수르 압박 본격화'],
 ['브가히야',742,740,'up','단명 왕'],
 ['베가',740,732,'','아람-에브라임 전쟁 배경'],
 ['호세아',732,722,'','북이스라엘 마지막 왕. BC 722 멸망']
];

const southKings=[
 ['르호보암',930,913,'','남유다 초대 왕. 왕국 분열 직후의 왕'],
 ['아비야',913,911,'up','단명 왕'],
 ['아사',911,870,'','남유다 초기 개혁 왕'],
 ['여호사밧',870,848,'',''],
 ['여호람',848,841,'',''],
 ['아하시야',841,840.7,'up','단명 왕'],
 ['아달랴',841,835,'down','왕위 찬탈기'],
 ['요아스',835,796,'',''],
 ['아마샤',796,767,'',''],
 ['웃시야',792,740,'','이사야 소명 시기와 연결'],
 ['요담',750,732,'',''],
 ['아하스',735,716,'','이사야 활동 배경과 연결'],
 ['히스기야',716,687,'','이사야, BC 701 앗수르 위기와 연결'],
 ['므낫세',687,642,'','남유다 최장기 왕. 깊은 타락의 흐름'],
 ['아몬',642,640,'up','단명 왕'],
 ['요시야',640,609,'','율법책 발견과 개혁. 스바냐·예레미야 시대'],
 ['여호아하스',609,608.8,'down','단기 왕'],
 ['여호야김',609,598,'','바벨론 압박 본격화'],
 ['여호야긴',598,597,'up','포로 사건과 연결'],
 ['시드기야',597,586,'','남유다 마지막 왕. BC 586 예루살렘 함락']
];

const prophets=[
 ['아히야',930,910,10,11,'여로보암 1세와 관련된 선지자'],
 ['스마야',930,910,32,9,'왕국 분열 직후 유다에 경고'],
 ['엘리야',875,850,54,14,'아합 시대 활동. 왕상 17~19장'],
 ['엘리사',854,796,76,22,'왕하 2~13장'],
 ['요나',785,760,98,8,'여로보암 2세 시기와 관련'],
 ['아모스',760,750,120,8,'북이스라엘 사회 불의 책망'],
 ['호세아',755,722,142,16,'북이스라엘 멸망 전 언약 배반 경고'],
 ['이사야',740,680,164,17,'웃시야·요담·아하스·히스기야 시대'],
 ['미가',735,700,186,10,'남유다 사회 불의와 심판 경고'],
 ['나훔',660,612,208,8,'니느웨 심판 예언'],
 ['스바냐',640,620,230,7,'요시야 시대 활동'],
 ['예레미야',627,586,252,9,'남유다 멸망기 선지자']
];

const nations=[
 ['애굽 (이집트)',930,586,10,'지속적인 대외 영향력'],
 ['아람 (시리아)',900,732,32,'북이스라엘과 잦은 충돌'],
 ['두로·시돈 (레바논)',880,740,54,'이세벨, 바알 문화 유입 통로'],
 ['모압 (요르단)',850,586,76,'이스라엘·유다와 영토 갈등'],
 ['암몬 (요르단)',850,586,98,'요르단 암만 지역 배경'],
 ['에돔 (요르단 남부)',845,586,120,'남부 무역로 갈등'],
 ['앗수르 (이라크 북부)',745,612,142,'북이스라엘 멸망, 히스기야 시대 위기'],
 ['바벨론 (이라크)',626,586,164,'남유다 멸망과 포로기의 직접 배경']
];

const events=[
 ['왕국 분열',930,16,'BC930<br>왕국분열','솔로몬 사후 남북 왕국 분열'],
 ['갈멜산 대결',850,76,'BC850경<br>갈멜산','엘리야와 바알 선지자들의 대결'],
 ['예후의 아합 왕조 심판',841,16,'BC841<br>예후','예후의 혁명과 아합 가문 심판'],
 ['북이스라엘 멸망',722,136,'BC722<br>북이스라엘<br>멸망','사마리아 함락 및 북이스라엘 멸망'],
 ['히스기야와 앗수르 위기',701,16,'BC701<br>앗수르위기','산헤립의 예루살렘 포위와 극적 구원'],
 ['요시야 개혁',622,76,'BC622<br>요시야개혁','율법책 발견과 전국적 개혁'],
 ['예루살렘 함락',586,136,'BC586<br>예루살렘<br>함락','느부갓네살에 의한 남유다 함락과 성전 파괴']
];

function addGrid(el){ticks.forEach(y=>el.insertAdjacentHTML('beforeend',`<div class="grid" style="left:${pct(y)}%"></div>`));}
function initAxis(){
 const axis=document.getElementById('axis');
 ticks.forEach(y=>axis.insertAdjacentHTML('beforeend',`<div class="tick ${y===722||y===586?'red':''}" style="left:${pct(y)}%">BC ${y}</div>`));
}
function addKing(plotId, rows, cls, south=false){
 const el=document.getElementById(plotId); addGrid(el);
 rows.forEach(([name,s,e,pin,info])=>{
   const p=span(s,e); const isPin=pin?` pin ${pin} ${south?'south-pin':''}`:'';
   const text=pin?name:name;
   el.insertAdjacentHTML('beforeend',`<div class="bar ${cls}${isPin}" data-short="${name}" data-title="${name}" data-info="연대: BC ${Math.round(s)}~${Math.round(e)}&#10;${info||''}" style="left:${p.left}%;top:28px;width:${p.width}%">${text}</div>`);
 });
}
function addBars(plotId, rows, cls){
 const el=document.getElementById(plotId); addGrid(el);
 rows.forEach(([name,s,e,top,w,info])=>{
   const p=span(s,e);
   el.insertAdjacentHTML('beforeend',`<div class="bar ${cls}" data-title="${name}" data-info="${info}" style="left:${p.left}%;top:${top}px;width:${p.width}%">${name}</div>`);
 });
}
function addNations(){
 const el=document.getElementById('nationsPlot'); addGrid(el);
 nations.forEach(([name,s,e,top,info])=>{
   const p=span(s,e);
   el.insertAdjacentHTML('beforeend',`<div class="bar nationBar" data-title="${name}" data-info="${info}" style="left:${p.left}%;top:${top}px;width:${p.width}%"><span class="scroll-label">${name}</span></div>`);
 });
}
function addEvents(){
 const el=document.getElementById('eventsPlot'); addGrid(el);
 events.forEach(([name,year,top,label,info])=>{
   const x=pct(year);
   el.insertAdjacentHTML('beforeend',`<div class="dot" data-title="${name}" data-info="${info}" style="left:${x}%;top:${top}px"></div><div class="eventText" style="left:${x}%;top:${top+16}px">${label}</div>`);
 });
}
initAxis();
addKing('northPlot', northKings, 'northBar', false);
addKing('southPlot', southKings, 'southBar', true);
addBars('prophetsPlot', prophets, 'prophetBar');
addNations();
addEvents();

const tabs=[...document.querySelectorAll('.tab')];
const views=[...document.querySelectorAll('.view')];
tabs.forEach(tab=>{
 tab.onclick=()=>{
   if(tab.dataset.view==='all'){
     const on=tab.classList.contains('active');
     tabs.forEach(t=>on?t.classList.remove('active'):t.classList.add('active'));
   }else{
     tab.classList.toggle('active');
     const allOn=tabs.filter(t=>t.dataset.view!=='all').every(t=>t.classList.contains('active'));
     document.querySelector('[data-view="all"]').classList.toggle('active',allOn);
   }
   const active=tabs.filter(t=>t.classList.contains('active')&&t.dataset.view!=='all').map(t=>t.dataset.view);
   views.forEach(v=>v.classList.toggle('hidden',!active.some(c=>v.classList.contains(c))));
   updateStickyLabels();
 };
});
const modal=document.getElementById('modal'), mt=document.getElementById('modalTitle'), mb=document.getElementById('modalBody');
document.addEventListener('click',e=>{
 const el=e.target.closest('[data-title]');
 if(!el || el.classList.contains('tab')) return;
 mt.textContent=el.dataset.title; mb.textContent=el.dataset.info||'준비중입니다.'; modal.classList.add('show');
});
document.getElementById('closeModal').onclick=()=>modal.classList.remove('show');
modal.onclick=e=>{if(e.target===modal)modal.classList.remove('show')};
const mainScroll=document.getElementById('mainScroll');
function updateStickyLabels(){
 const scrollLeft=mainScroll.scrollLeft;
 document.querySelectorAll('.scroll-label').forEach(label=>{
   const bar=label.parentElement, barLeft=bar.offsetLeft, barWidth=bar.offsetWidth, labelWidth=label.offsetWidth||80;
   let x=scrollLeft-barLeft+6; const max=barWidth-labelWidth-8;
   if(x<0)x=0; if(x>max)x=max; label.style.transform=`translateX(${x}px)`;
 });
}
mainScroll.addEventListener('scroll',updateStickyLabels,{passive:true});
window.addEventListener('resize',updateStickyLabels);
setTimeout(updateStickyLabels,100);
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>


<script id="cen-matrix-three-link-script">
(function(){
  document.addEventListener('click', function(e){
    const btn = e.target.closest('.action[data-link]');
    if(!btn) return;
    e.preventDefault();
    e.stopPropagation();
    window.open(btn.dataset.link, '_self');
  }, true);
})();
</script>



<script id="joash-amaziah-final-label-script">
(function(){
  function addLabel(plotId, text, leftPct, topPx, pos, info){
    const plot = document.getElementById(plotId);
    if(!plot) return;

    plot.querySelectorAll('.fixedKingLabel[data-fixed="1"][data-title="'+text+'"]').forEach(el => el.remove());

    const label = document.createElement('div');
    label.className = 'fixedKingLabel south ' + pos;
    label.dataset.title = text;
    label.dataset.info = info || '';
    label.dataset.fixed = '1';
    label.style.left = leftPct + '%';
    label.style.top = topPx + 'px';
    label.textContent = text;
    plot.appendChild(label);
  }

  function run(){
    // 북이스라엘 요아스 라벨은 제거: 막대 안 텍스트가 이미 보임
    const northPlot = document.getElementById('northPlot');
    if(northPlot){
      northPlot.querySelectorAll('.fixedKingLabel[data-title="요아스"], .kingNameLabel[data-title="요아스"]').forEach(el => el.remove());
    }

    // 남유다 요아스/아마샤: 실제 빈 막대를 가리키도록 이전보다 왼쪽으로 보정
    addLabel('southPlot', '요아스', 46.8, 7, 'top', '연대: BC 835~796');
    addLabel('southPlot', '아마샤', 57.8, 51, 'bottom', '연대: BC 796~767');
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(run, 250); });
  }else{
    setTimeout(run, 250);
  }
  window.addEventListener('resize', function(){ setTimeout(run, 100); });
})();
</script>
